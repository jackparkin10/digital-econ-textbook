<svg width="100%" height="100%" viewBox="0 0 620 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Supply and demand graph">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#eef6ff" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="28" fill="url(#bg)" />
  <!-- Y-axis (Price) -->
  <line x1="90" y1="50" x2="90" y2="310" stroke="#4f5f72" stroke-width="3" />
  <!-- X-axis (Quantity) -->
  <line x1="90" y1="310" x2="560" y2="310" stroke="#4f5f72" stroke-width="3" />
  <!-- Axis labels -->
  <text x="65" y="35" fill="#5f6b73" font-size="16" font-weight="600">P</text>
  <text x="565" y="330" fill="#5f6b73" font-size="16" font-weight="600">Q</text>
  <!-- Demand curve (downward slope from upper left to lower right) -->
  <path d="M 140 100 Q 240 150 340 200 Q 430 250 520 280" fill="none" stroke="#fb5353" stroke-width="5" stroke-linecap="round" />
  <!-- Supply curve (upward slope from lower left to upper right) -->
  <path d="M 140 280 Q 240 230 340 160 Q 430 90 520 40" fill="none" stroke="#2f80ed" stroke-width="5" stroke-linecap="round" />
  <!-- Equilibrium intersection point -->
  <circle cx="305" cy="190" r="14" fill="#20c997" stroke="#fff" stroke-width="4" />
  <text x="318" y="195" fill="#154d3d" font-size="14" font-weight="700">E</text>
  <!-- Reference lines to axes -->
  <line x1="305" y1="190" x2="305" y2="310" stroke="#20c997" stroke-dasharray="6 4" stroke-width="2" opacity="0.5" />
  <line x1="305" y1="190" x2="90" y2="190" stroke="#20c997" stroke-dasharray="6 4" stroke-width="2" opacity="0.5" />
  <!-- Curve labels -->
  <text x="155" y="85" fill="#fb5353" font-size="14" font-weight="600">Demand</text>
  <text x="470" y="50" fill="#2f80ed" font-size="14" font-weight="600">Supply</text>
</svg>
